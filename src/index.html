<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Visual Analytics: PCA vs MDS</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        /* 1. LAYOUT NO-SCROLL */
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
            height: 100vh; /* Occupa tutta l'altezza */
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Vietato scrollare */
        }

        /* Header compatto */
        header {
            background: white;
            padding: 10px 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            flex-shrink: 0;
        }

        h1 { margin: 0; font-size: 1.2rem; color: #333; }
        
        /* Legenda Discreta (A Blocchi) */
        .legend {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.8rem;
        }
        .legend-item { display: flex; align-items: center; gap: 4px; }
        .color-box { width: 15px; height: 15px; border-radius: 3px; border: 1px solid #ccc; }

        /* Area Grafici */
        .dashboard {
            flex-grow: 1;
            display: flex;
            justify-content: center; /* Centrati orizzontalmente */
            align-items: center;     /* Centrati verticalmente */
            gap: 20px;
            padding: 10px;
        }

        .chart-box {
            background: white;
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Dimensione dinamica ma quadrata */
            width: 45vh; 
            height: 45vh;
            min-width: 400px;
            min-height: 400px;
        }

        h3 { margin: 0 0 10px 0; font-size: 1rem; color: #555; }

        /* Punti */
        circle {
            stroke: #444; /* Bordo più scuro per vedere meglio i punti sovrapposti */
            stroke-width: 0.8px; 
            transition: r 0.1s;
        }
        circle.hovered { stroke: #000; stroke-width: 2px; r: 8px; z-index: 999; }
        circle.dimmed { opacity: 0.1; }

        /* Tooltip */
        #tooltip {
            position: absolute; opacity: 0; background: rgba(0,0,0,0.85); color: white;
            padding: 8px; border-radius: 4px; pointer-events: none; font-size: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>PCA vs MDS (Euclideo)</h1>
            <small style="color:#666">Confronto Distorsione</small>
        </div>

        <div class="legend">
            <span>Compresso (FP)</span>
            <div class="legend-item"><div class="color-box" style="background:#0571b0;"></div></div>
            <div class="legend-item"><div class="color-box" style="background:#92c5de;"></div></div>
            <div class="legend-item"><div class="color-box" style="background:#f7f7f7;"></div><span style="margin:0 5px;">Neutro</span></div>
            <div class="legend-item"><div class="color-box" style="background:#f4a582;"></div></div>
            <div class="legend-item"><div class="color-box" style="background:#ca0020;"></div></div>
            <span>Stirato (FN)</span>
        </div>
    </header>

    <div class="dashboard">
        <div class="chart-box" id="container-pca">
            <h3>PCA (Global Variance)</h3>
            <div id="chart-pca"></div>
        </div>
        <div class="chart-box" id="container-mds">
            <h3>MDS (Local Distance)</h3>
            <div id="chart-mds"></div>
        </div>
    </div>

    <div id="tooltip"></div>

<script>
    // Caricamento Dati
    d3.json("wine_data.json").then(function(data) {

        // --- SOLUZIONE CLUSTER ---
        // 1. Definiamo le dimensioni in base al contenitore CSS per riempirlo bene
        const container = document.getElementById('container-pca');
        const width = container.clientWidth - 40;
        const height = container.clientHeight - 40;

        // --- 3. SCALA COLORI DISCRETA (Quantize/Threshold) ---
        // Definiamo delle soglie fisse per l'errore.
        // Esempio: Errore < -0.1 è grave compressione. Errore > 0.1 è grave stiramento.
        const colorScale = d3.scaleThreshold()
            .domain([-0.1, -0.03, 0.03, 0.1]) // Le soglie che separano i colori
            .range(["#0571b0", "#92c5de", "#f7f7f7", "#f4a582", "#ca0020"]);
            // Blu Scuro, Azzurro, Bianco, Arancio, Rosso Scuro

        function drawScatter(selector, xProp, yProp, scoreProp) {
            const svg = d3.select(selector)
                .append("svg")
                .attr("width", width)
                .attr("height", height);

            // Margini interni
            const m = 30; 
            
            // Scale X e Y (Usiamo nice() per arrotondare gli assi e vedere meglio i cluster)
            const xScale = d3.scaleLinear()
                .domain(d3.extent(data, d => d[xProp])).nice()
                .range([m, width - m]);

            const yScale = d3.scaleLinear()
                .domain(d3.extent(data, d => d[yProp])).nice()
                .range([height - m, m]);

            // Assi minimali
            svg.append("g").attr("transform", `translate(0,${height-m})`).call(d3.axisBottom(xScale).ticks(5));
            svg.append("g").attr("transform", `translate(${m},0)`).call(d3.axisLeft(yScale).ticks(5));

            // Punti
            svg.selectAll("circle")
                .data(data)
                .enter().append("circle")
                .attr("cx", d => xScale(d[xProp]))
                .attr("cy", d => yScale(d[yProp]))
                .attr("r", 5) // Raggio fisso ben visibile
                .attr("fill", d => colorScale(d[scoreProp]))
                .attr("class", d => "dot-" + d.id)
                
                // Interazione
                .on("mouseover", function(event, d) {
                    d3.selectAll(".dot-" + d.id).classed("hovered", true).raise();
                    d3.selectAll("circle:not(.dot-" + d.id + ")").classed("dimmed", true);
                    
                    const t = d3.select("#tooltip");
                    t.transition().duration(100).style("opacity", 1);
                    t.html(`<b>${d.class_name}</b><br>Err: ${d[scoreProp].toFixed(3)}`)
                     .style("left", (event.pageX + 10) + "px")
                     .style("top", (event.pageY - 20) + "px");
                })
                .on("mouseout", function() {
                    d3.selectAll("circle").classed("hovered", false).classed("dimmed", false);
                    d3.select("#tooltip").style("opacity", 0);
                });
        }

        drawScatter("#chart-pca", "pca_x", "pca_y", "score_pca");
        drawScatter("#chart-mds", "mds_x", "mds_y", "score_mds");

    }).catch(err => {
        alert("Errore caricamento JSON. Controlla la console.");
        console.error(err);
    });
</script>
</body>
</html>
